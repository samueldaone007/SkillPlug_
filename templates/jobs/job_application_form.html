{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="min-h-screen py-12 px-4 bg-gray-50 dark:bg-gray-900">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center mb-8">
            <a href="{% url 'job_detail' job.pk %}" class="mr-4 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Apply for Job</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">{{ job.title }}</p>
            </div>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-6 md:p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Your Message *</label>
                    {{ form.message }}
                    <p class="text-xs text-gray-500 mt-1">Explain why you're a great fit for this job</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Proposed Budget (NGN, optional)</label>
                    {{ form.proposed_budget }}
                </div>
                
                <div class="flex items-center gap-4 pt-4">
                    <button type="submit" class="flex-1 py-3 bg-gradient-to-r from-primary-500 to-primary-600 text-white font-semibold rounded-xl hover:from-primary-600 hover:to-primary-700 shadow-lg transition-all-300">
                        Submit Application
                    </button>
                    <a href="{% url 'job_detail' job.pk %}" class="px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
