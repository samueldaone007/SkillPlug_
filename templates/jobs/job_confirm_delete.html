{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">Delete Job Posting?</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8">Are you sure you want to delete "{{ job.title }}"? This action cannot be undone.</p>
        <form method="post" class="flex items-center justify-center gap-4">
            {% csrf_token %}
            <button type="submit" class="px-8 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 shadow-lg transition-all-300">
                Delete Job
            </button>
            <a href="{% url 'job_detail' job.pk %}" class="px-8 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                Cancel
            </a>
        </form>
    </div>
</section>
{% endblock %}
