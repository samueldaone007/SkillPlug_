{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md text-center">
        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">Check Your Email</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8">We've sent you an email with instructions to reset your password. If you don't see it, check your spam folder.</p>
        <a href="{% url 'account_login' %}" class="inline-flex px-8 py-3 bg-gradient-to-r from-primary-500 to-primary-600 text-white font-semibold rounded-xl hover:from-primary-600 hover:to-primary-700 shadow-lg transition-all-300">
            Back to Sign In
        </a>
    </div>
</section>
{% endblock %}
