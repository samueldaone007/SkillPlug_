{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'home' %}" class="inline-flex items-center justify-center space-x-2">
                <div class="w-12 h-12 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-gray-900 dark:text-white">SkillPlug</span>
            </a>
            <h1 class="mt-6 text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h1>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Enter your email and we'll send you a reset link</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-6 md:p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                    {{ form.email }}
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary-500 to-primary-600 text-white font-semibold rounded-xl hover:from-primary-600 hover:to-primary-700 shadow-lg transition-all-300">
                    Send Reset Link
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="{% url 'account_login' %}" class="text-sm text-primary-600 dark:text-primary-400 hover:underline">Back to Sign In</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
