{% load humanize %}

{% if freelancers %}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="freelancer-results">
        {% for freelancer in freelancers %}
            {% include 'partials/freelancer_card.html' with freelancer=freelancer %}
        {% endfor %}
    </div>
{% else %}
    <div class="text-center py-16" id="freelancer-results">
        <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2">No freelancers found</h3>
        <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">Try adjusting your search terms or filters to find what you're looking for.</p>
    </div>
{% endif %}
